<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribes — Animation Editor</title>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0c10;
    color: #c8ccd4;
    display: flex;
  }

  /* ── Sidebar ──────────────────────────────────────────────── */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: #12151c;
    border-right: 1px solid #1e2330;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #1e2330;
    background: linear-gradient(135deg, #141824, #1a1e2e);
  }
  #sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #FFD479;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #sidebar-header .subtitle {
    font-size: 11px;
    color: #667;
    letter-spacing: 0.5px;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid #1e2330;
    background: #10131a;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 8px;
    background: none;
    border: none;
    color: #556;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: #99a; }
  .tab-btn.active { color: #FFD479; border-bottom-color: #FFD479; }

  .tab-panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .tab-panel.active { display: block; }

  /* Scrollbar */
  .tab-panel::-webkit-scrollbar { width: 6px; }
  .tab-panel::-webkit-scrollbar-track { background: transparent; }
  .tab-panel::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 3px; }

  /* ── Clip List (Clips tab) ────────────────────────────────── */
  .clip-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    margin-bottom: 4px;
    border-radius: 6px;
    background: #181c26;
    border: 1px solid #1e2330;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clip-item:hover { background: #1e2230; border-color: #2a3040; }
  .clip-item.playing { background: #1a2230; border-color: #FFD47944; }
  .clip-item .clip-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #222840;
    display: flex; align-items: center; justify-content: center;
    margin-right: 10px;
    font-size: 12px;
    flex-shrink: 0;
  }
  .clip-item.playing .clip-icon { background: #FFD47930; color: #FFD479; }
  .clip-item .clip-name {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    color: #bbc;
  }
  .clip-item.playing .clip-name { color: #FFD479; }
  .clip-item .clip-dur {
    font-size: 10px;
    color: #556;
    font-family: 'Roboto Mono', monospace;
  }

  /* ── Mapping tab ──────────────────────────────────────────── */
  .mapping-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
  }
  .mapping-row label {
    width: 110px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #889;
    flex-shrink: 0;
  }
  .mapping-row select {
    flex: 1;
    padding: 6px 8px;
    background: #181c26;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    color: #bbc;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .mapping-row select:focus { border-color: #FFD47966; }
  .mapping-row .loop-toggle {
    width: 24px; height: 24px;
    background: #181c26;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    color: #556;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mapping-row .loop-toggle.active { color: #FFD479; border-color: #FFD47966; }
  .mapping-row .preview-btn {
    width: 24px; height: 24px;
    background: #181c26;
    border: 1px solid #2a2e3a;
    border-radius: 4px;
    color: #556;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mapping-row .preview-btn:hover { color: #FFD479; border-color: #FFD47966; }

  .section-heading {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #556;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #1e2330;
  }
  .section-heading:first-child { margin-top: 0; }

  /* ── Blend controls ───────────────────────────────────────── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .slider-row label {
    width: 110px;
    font-size: 11px;
    font-weight: 600;
    color: #889;
    flex-shrink: 0;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: #FFD479;
    height: 4px;
  }
  .slider-row .val {
    width: 40px;
    font-size: 11px;
    color: #FFD479;
    text-align: right;
    font-family: 'Roboto Mono', monospace;
  }

  /* ── Export section ───────────────────────────────────────── */
  .export-btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background: linear-gradient(135deg, #FFD47920, #FFD47910);
    border: 1px solid #FFD47944;
    border-radius: 6px;
    color: #FFD479;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-btn:hover { background: linear-gradient(135deg, #FFD47935, #FFD47920); }

  .json-preview {
    margin-top: 10px;
    padding: 10px;
    background: #0d1018;
    border: 1px solid #1e2330;
    border-radius: 6px;
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    color: #8a8;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }

  /* ── Viewport ─────────────────────────────────────────────── */
  #viewport {
    flex: 1;
    position: relative;
    background: #0a0c10;
  }
  #viewport canvas { display: block; }

  /* ── Info bar ─────────────────────────────────────────────── */
  #info-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 36px;
    background: linear-gradient(0deg, #0a0c10ee, #0a0c10aa);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    font-size: 11px;
    font-family: 'Roboto Mono', monospace;
    color: #667;
    pointer-events: none;
  }
  #info-bar .info-label { color: #445; }
  #info-bar .info-value { color: #FFD479; }
  #info-bar .info-value.idle-val { color: #7a8a9a; }

  /* ── Progress bar ─────────────────────────────────────────── */
  #progress-track {
    position: absolute;
    bottom: 36px; left: 0; right: 0;
    height: 3px;
    background: #1a1e28;
  }
  #progress-fill {
    height: 100%;
    background: #FFD479;
    width: 0%;
    transition: width 0.05s linear;
  }

  /* ── Loading overlay ──────────────────────────────────────── */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0c10;
    z-index: 100;
    color: #FFD479;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #1e2330;
    border-top-color: #FFD479;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Timeline scrubber ────────────────────────────────────── */
  #scrubber {
    position: absolute;
    bottom: 39px; left: 0; right: 0;
    height: 20px;
    cursor: pointer;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>⚔ Anim Editor</h1>
    <div class="subtitle">Tribes Character Animation Tool</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="clips">Clips</button>
    <button class="tab-btn" data-tab="mapping">Mapping</button>
    <button class="tab-btn" data-tab="export">Export</button>
  </div>

  <!-- Clips tab -->
  <div id="tab-clips" class="tab-panel active">
    <div id="clip-list"></div>
  </div>

  <!-- Mapping tab -->
  <div id="tab-mapping" class="tab-panel">
    <div class="section-heading">Game State → Animation Clip</div>
    <div id="mapping-list"></div>

    <div class="section-heading">Blend Settings</div>
    <div class="slider-row">
      <label>Crossfade</label>
      <input type="range" id="crossfade-slider" min="0" max="1" step="0.05" value="0.25">
      <span class="val" id="crossfade-val">0.25s</span>
    </div>
    <div class="slider-row">
      <label>Playback Rate</label>
      <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1.0">
      <span class="val" id="speed-val">1.0x</span>
    </div>
  </div>

  <!-- Export tab -->
  <div id="tab-export" class="tab-panel">
    <div class="section-heading">Export Animation Config</div>
    <p style="font-size:11px;color:#667;margin-bottom:12px;line-height:1.5;">
      Export the current game-state→clip mapping as JSON for use in <code style="color:#8a8;">renderer_characters.js</code>.
    </p>
    <button class="export-btn" id="btn-export-json">📋 Copy JSON to Clipboard</button>
    <button class="export-btn" id="btn-download-json" style="margin-top:6px;">💾 Download JSON</button>
    <div class="json-preview" id="json-preview"></div>
  </div>
</div>

<!-- ── Viewport ───────────────────────────────────────────── -->
<div id="viewport">
  <div id="loading">
    <div class="spinner"></div>
    Loading character model…
  </div>
  <div id="scrubber"></div>
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="info-bar">
    <span><span class="info-label">CLIP </span><span class="info-value idle-val" id="info-clip">—</span></span>
    <span><span class="info-label">TIME </span><span class="info-value" id="info-time">0.00</span><span class="info-label">s</span></span>
    <span><span class="info-label">DUR </span><span class="info-value" id="info-dur">0.00</span><span class="info-label">s</span></span>
    <span><span class="info-label">LOOP </span><span class="info-value" id="info-loop">—</span></span>
    <span><span class="info-label">BONES </span><span class="info-value" id="info-bones">—</span></span>
  </div>
</div>

<!-- ── Three.js ───────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "../../vendor/three/r170/three.module.js",
    "three/addons/": "../../vendor/three/r170/addons/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Constants ────────────────────────────────────────────────
const MODEL_PATH = './crimson_sentinel_rigged.glb';

const GAME_STATES = [
  { id: 'idle',          label: 'Idle',          defaultClip: 'idle',       loop: true  },
  { id: 'run',           label: 'Run',           defaultClip: 'run',        loop: true  },
  { id: 'run_backward',  label: 'Run Backward',  defaultClip: 'run_backward', loop: true },
  { id: 'strafe_left',   label: 'Strafe Left',   defaultClip: 'strafe',     loop: true  },
  { id: 'strafe_right',  label: 'Strafe Right',  defaultClip: 'strafe',     loop: true  },
  { id: 'jump',          label: 'Jump',          defaultClip: 'jump',       loop: false },
  { id: 'jet',           label: 'Jetting',       defaultClip: 'jet',        loop: true  },
  { id: 'ski',           label: 'Skiing',         defaultClip: 'ski',        loop: true  },
  { id: 'fire',          label: 'Fire Weapon',   defaultClip: 'fire_rifle', loop: false },
  { id: 'hard_landing',  label: 'Hard Landing',  defaultClip: 'hard_landing', loop: false },
  { id: 'fall',          label: 'Falling',       defaultClip: 'fall',       loop: true  },
  { id: 'death',         label: 'Death',         defaultClip: 'death',      loop: false },
];

// ── State ────────────────────────────────────────────────────
let scene, camera, renderer, controls, clock, mixer;
let model, clips = {};
let activeAction = null, activeClipName = null;
let crossfadeDuration = 0.25;
let playbackRate = 1.0;

// Mapping state: gameState → { clip, loop }
const mapping = {};
GAME_STATES.forEach(gs => {
  mapping[gs.id] = { clip: gs.defaultClip, loop: gs.loop };
});

// ── Init Three.js ────────────────────────────────────────────
function initScene() {
  const vp = document.getElementById('viewport');
  const w = vp.clientWidth, h = vp.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0c10);
  scene.fog = new THREE.Fog(0x0a0c10, 20, 60);

  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 1.2, 4);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  vp.insertBefore(renderer.domElement, vp.firstChild);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.9, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxDistance = 15;
  controls.minDistance = 1;
  controls.update();

  clock = new THREE.Clock();

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x445566, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffeedd, 1.8);
  dirLight.position.set(5, 8, 4);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 25;
  dirLight.shadow.camera.left = -5;
  dirLight.shadow.camera.right = 5;
  dirLight.shadow.camera.top = 5;
  dirLight.shadow.camera.bottom = -5;
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0x8899bb, 0.4);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xFFD479, 0.3);
  rimLight.position.set(-1, 3, -4);
  scene.add(rimLight);

  // Ground grid
  const gridHelper = new THREE.GridHelper(20, 40, 0x1a2030, 0x141822);
  scene.add(gridHelper);

  // Ground plane for shadows
  const groundGeo = new THREE.PlaneGeometry(20, 20);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Resize
  window.addEventListener('resize', () => {
    const w2 = vp.clientWidth, h2 = vp.clientHeight;
    camera.aspect = w2 / h2;
    camera.updateProjectionMatrix();
    renderer.setSize(w2, h2);
  });
}

// ── Load Model ───────────────────────────────────────────────
async function loadModel() {
  const loader = new GLTFLoader();
  const gltf = await new Promise((resolve, reject) => {
    loader.load(MODEL_PATH, resolve, undefined, reject);
  });

  model = gltf.scene;
  model.updateWorldMatrix(true, true);

  // Compute foot offset
  const box = new THREE.Box3().setFromObject(model);
  const footOffset = box.min.y;
  model.position.y = -footOffset; // feet on ground

  // Materials: tone down for viewport
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      if (child.material) {
        child.material.envMapIntensity = 0.3;
        child.material.roughness = Math.max(child.material.roughness, 0.5);
        child.material.metalness = Math.min(child.material.metalness, 0.2);
        child.material.needsUpdate = true;
      }
    }
  });

  scene.add(model);

  // Skeleton info
  let boneCount = 0;
  model.traverse(c => { if (c.isBone) boneCount++; });
  document.getElementById('info-bones').textContent = boneCount;

  // Animation
  mixer = new THREE.AnimationMixer(model);
  for (const clip of gltf.animations) {
    clips[clip.name] = clip;
  }

  // Hide loading
  document.getElementById('loading').style.display = 'none';

  return Object.keys(clips);
}

// ── Play Clip ────────────────────────────────────────────────
function playClip(name, loop = true, fade = null) {
  if (!clips[name] || !mixer) return;
  if (fade === null) fade = crossfadeDuration;

  const clip = clips[name];
  const newAction = mixer.clipAction(clip);
  newAction.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
  newAction.clampWhenFinished = !loop;
  newAction.timeScale = playbackRate;

  if (activeAction && activeAction !== newAction) {
    activeAction.fadeOut(fade);
  }

  newAction.reset().fadeIn(fade).play();
  activeAction = newAction;
  activeClipName = name;

  // Update UI
  updateClipListHighlight(name);
  updateInfoBar();
}

function stopAll() {
  if (mixer) mixer.stopAllAction();
  activeAction = null;
  activeClipName = null;
  updateClipListHighlight(null);
  updateInfoBar();
}

// ── UI: Clip List ────────────────────────────────────────────
function buildClipList(clipNames) {
  const container = document.getElementById('clip-list');
  container.innerHTML = '';

  clipNames.sort().forEach(name => {
    const clip = clips[name];
    const item = document.createElement('div');
    item.className = 'clip-item';
    item.dataset.clip = name;
    item.innerHTML = `
      <div class="clip-icon">▶</div>
      <div class="clip-name">${name}</div>
      <div class="clip-dur">${clip.duration.toFixed(2)}s</div>
    `;
    item.addEventListener('click', () => {
      if (activeClipName === name) {
        stopAll();
      } else {
        playClip(name, true);
      }
    });
    container.appendChild(item);
  });
}

function updateClipListHighlight(activeName) {
  document.querySelectorAll('.clip-item').forEach(el => {
    el.classList.toggle('playing', el.dataset.clip === activeName);
  });
}

// ── UI: Mapping ──────────────────────────────────────────────
function buildMappingPanel(clipNames) {
  const container = document.getElementById('mapping-list');
  container.innerHTML = '';

  GAME_STATES.forEach(gs => {
    const row = document.createElement('div');
    row.className = 'mapping-row';

    // Label
    const label = document.createElement('label');
    label.textContent = gs.label;

    // Dropdown
    const select = document.createElement('select');
    select.dataset.state = gs.id;
    const sorted = [...clipNames].sort();
    sorted.forEach(cn => {
      const opt = document.createElement('option');
      opt.value = cn;
      opt.textContent = cn;
      if (cn === mapping[gs.id].clip) opt.selected = true;
      select.appendChild(opt);
    });
    select.addEventListener('change', () => {
      mapping[gs.id].clip = select.value;
    });

    // Loop toggle
    const loopBtn = document.createElement('button');
    loopBtn.className = 'loop-toggle' + (mapping[gs.id].loop ? ' active' : '');
    loopBtn.textContent = '↻';
    loopBtn.title = 'Toggle looping';
    loopBtn.addEventListener('click', () => {
      mapping[gs.id].loop = !mapping[gs.id].loop;
      loopBtn.classList.toggle('active', mapping[gs.id].loop);
    });

    // Preview button
    const previewBtn = document.createElement('button');
    previewBtn.className = 'preview-btn';
    previewBtn.textContent = '▶';
    previewBtn.title = 'Preview this mapping';
    previewBtn.addEventListener('click', () => {
      playClip(mapping[gs.id].clip, mapping[gs.id].loop);
    });

    row.appendChild(label);
    row.appendChild(select);
    row.appendChild(loopBtn);
    row.appendChild(previewBtn);
    container.appendChild(row);
  });
}

// ── UI: Blend Controls ───────────────────────────────────────
function initBlendControls() {
  const cfSlider = document.getElementById('crossfade-slider');
  const cfVal = document.getElementById('crossfade-val');
  cfSlider.addEventListener('input', () => {
    crossfadeDuration = parseFloat(cfSlider.value);
    cfVal.textContent = crossfadeDuration.toFixed(2) + 's';
  });

  const spSlider = document.getElementById('speed-slider');
  const spVal = document.getElementById('speed-val');
  spSlider.addEventListener('input', () => {
    playbackRate = parseFloat(spSlider.value);
    spVal.textContent = playbackRate.toFixed(1) + 'x';
    if (activeAction) activeAction.timeScale = playbackRate;
  });
}

// ── UI: Tabs ─────────────────────────────────────────────────
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}

// ── UI: Export ───────────────────────────────────────────────
function getExportJSON() {
  const config = {
    _comment: 'Generated by Tribes Animation Editor',
    crossfadeDuration,
    states: {}
  };
  GAME_STATES.forEach(gs => {
    config.states[gs.id] = {
      clip: mapping[gs.id].clip,
      loop: mapping[gs.id].loop
    };
  });
  return JSON.stringify(config, null, 2);
}

function initExport() {
  const preview = document.getElementById('json-preview');

  document.getElementById('btn-export-json').addEventListener('click', () => {
    const json = getExportJSON();
    navigator.clipboard.writeText(json).then(() => {
      const btn = document.getElementById('btn-export-json');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy JSON to Clipboard', 1500);
    });
    preview.textContent = json;
    preview.style.display = 'block';
  });

  document.getElementById('btn-download-json').addEventListener('click', () => {
    const json = getExportJSON();
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'animation_config.json';
    a.click();
    URL.revokeObjectURL(url);
    preview.textContent = json;
    preview.style.display = 'block';
  });
}

// ── UI: Info Bar ─────────────────────────────────────────────
function updateInfoBar() {
  const clipEl = document.getElementById('info-clip');
  const loopEl = document.getElementById('info-loop');

  if (activeClipName) {
    clipEl.textContent = activeClipName;
    clipEl.className = 'info-value';
    const gs = Object.values(mapping).find(m => m.clip === activeClipName);
    const isLoop = activeAction ? activeAction.loop === THREE.LoopRepeat : (gs ? gs.loop : true);
    loopEl.textContent = isLoop ? 'ON' : 'OFF';
  } else {
    clipEl.textContent = '— stopped —';
    clipEl.className = 'info-value idle-val';
    loopEl.textContent = '—';
  }
}

// ── Scrubber / Progress ──────────────────────────────────────
function initScrubber() {
  const scrubber = document.getElementById('scrubber');
  let scrubbing = false;

  function scrubTo(e) {
    if (!activeAction || !activeClipName) return;
    const rect = scrubber.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const dur = clips[activeClipName].duration;
    activeAction.time = frac * dur;
  }

  scrubber.addEventListener('mousedown', (e) => {
    scrubbing = true;
    scrubTo(e);
  });
  window.addEventListener('mousemove', (e) => { if (scrubbing) scrubTo(e); });
  window.addEventListener('mouseup', () => { scrubbing = false; });
}

// ── Render Loop ──────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  controls.update();
  renderer.render(scene, camera);

  // Update time display
  if (activeAction && activeClipName && clips[activeClipName]) {
    const t = activeAction.time;
    const dur = clips[activeClipName].duration;
    document.getElementById('info-time').textContent = t.toFixed(2);
    document.getElementById('info-dur').textContent = dur.toFixed(2);
    document.getElementById('progress-fill').style.width = ((t / dur) * 100) + '%';
  } else {
    document.getElementById('info-time').textContent = '0.00';
    document.getElementById('progress-fill').style.width = '0%';
  }
}

// ── Boot ─────────────────────────────────────────────────────
async function main() {
  initScene();
  initTabs();
  initBlendControls();
  initExport();
  initScrubber();

  try {
    const clipNames = await loadModel();
    buildClipList(clipNames);
    buildMappingPanel(clipNames);

    // Auto-play idle
    if (clips['idle']) playClip('idle', true, 0);
  } catch (err) {
    console.error('Failed to load model:', err);
    document.getElementById('loading').innerHTML =
      `<div style="color:#f66;font-size:14px;">Failed to load model</div>
       <div style="color:#667;font-size:11px;margin-top:8px;">${err.message}</div>`;
  }

  animate();
}

main();
</script>
