<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribes Animation NLE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0c10; --bg2: #12151c; --bg3: #1a1e28; --bg4: #242a38;
  --border: #2a3040; --text: #c8ccd4; --text2: #8890a0;
  --accent: #00b4ff; --accent2: #0080cc; --accent-dim: rgba(0,180,255,0.15);
  --warn: #ff6644; --green: #44cc66; --yellow: #FFD479;
  --track1: #2255aa; --track2: #aa4422; --track3: #22aa55; --track4: #aa22aa;
  --track5: #aa8822; --track6: #2288aa;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }
#app { display: grid; grid-template-columns: 220px 1fr 200px; grid-template-rows: 1fr 260px; width: 100%; height: 100%; }

/* === CLIP LIBRARY (left sidebar) === */
#library { grid-row: 1/3; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#library-header { padding: 10px 12px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
#library-clips { flex: 1; overflow-y: auto; padding: 6px; }
.lib-clip { padding: 7px 10px; margin: 2px 0; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; cursor: grab; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; user-select: none; }
.lib-clip:hover { background: var(--bg4); border-color: var(--accent2); }
.lib-clip:active { cursor: grabbing; }
.lib-clip .dur { color: var(--text2); font-size: 10px; font-family: 'Roboto Mono', monospace; }
.lib-clip .preview-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; padding: 0 4px; }
.lib-clip .preview-btn:hover { color: #fff; }

/* Library sections */
.lib-section { padding: 8px 10px 4px; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); margin-top: 4px; }

/* === VIEWPORT === */
#viewport { background: #000; position: relative; overflow: hidden; }
#viewport canvas { width: 100% !important; height: 100% !important; }
#viewport-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 8px 12px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
#viewport-overlay > * { pointer-events: auto; }
#frame-info { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--yellow); background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 3px; }
#viewport-controls { display: flex; gap: 4px; align-items: center; }
#viewport-controls select, #viewport-controls button { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 3px; font-size: 11px; cursor: pointer; }
#viewport-controls button:hover { background: var(--accent2); }
#loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
#loading .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* === TIMELINE === */
#timeline { background: var(--bg2); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; grid-column: 2 / 4; }

/* Transport bar */
#transport { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg3); border-bottom: 1px solid var(--border); min-height: 34px; flex-shrink: 0; }
#transport button { background: var(--bg4); border: 1px solid var(--border); color: var(--text); width: 28px; height: 24px; border-radius: 3px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
#transport button:hover { background: var(--accent2); border-color: var(--accent); }
#transport button.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
#transport .sep { width: 1px; height: 18px; background: var(--border); }
#transport label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
#transport select, #transport input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 2px 6px; border-radius: 3px; font-size: 11px; }
#transport .time-display { font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--yellow); min-width: 120px; }
.tool-group { display: flex; gap: 2px; }

/* Track header + track area */
#timeline-body { flex: 1; display: flex; overflow: hidden; }
#track-headers { width: 140px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
.track-header { height: 50px; border-bottom: 1px solid var(--border); padding: 4px 8px; display: flex; flex-direction: column; justify-content: center; background: var(--bg3); }
.track-header .track-name { font-size: 11px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; }
.track-header .track-name .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.track-header .track-controls { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.track-header .track-controls label { font-size: 9px; color: var(--text2); }
.track-header .track-controls input[type="range"] { width: 50px; height: 12px; }
.track-header .track-controls button { background: none; border: none; color: var(--text2); font-size: 11px; cursor: pointer; padding: 0 2px; }
.track-header .track-controls button:hover { color: var(--warn); }
.track-header .mask-select { font-size: 9px; background: var(--bg); border: 1px solid var(--border); color: var(--text2); border-radius: 2px; padding: 0 2px; }

/* Timeline canvas area */
#timeline-scroll { flex: 1; overflow: auto; position: relative; }
#timeline-canvas { position: relative; min-height: 100%; }

/* Ruler */
#ruler { height: 22px; position: sticky; top: 0; z-index: 20; background: var(--bg3); border-bottom: 1px solid var(--border); cursor: pointer; }

/* Track lanes */
.track-lane { height: 50px; border-bottom: 1px solid var(--border); position: relative; }
.track-lane:nth-child(odd) { background: rgba(255,255,255,0.01); }
.track-lane.drop-hover { background: var(--accent-dim); }

/* Clips on timeline */
.timeline-clip { position: absolute; top: 4px; height: 42px; border-radius: 4px; cursor: grab; display: flex; align-items: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); font-size: 10px; color: #fff; user-select: none; min-width: 20px; }
.timeline-clip:hover { border-color: var(--accent); z-index: 5; }
.timeline-clip.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 8px rgba(0,180,255,0.3); z-index: 10; }
.timeline-clip .clip-label { padding: 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.timeline-clip .clip-handle { position: absolute; top: 0; width: 6px; height: 100%; cursor: ew-resize; z-index: 5; }
.timeline-clip .clip-handle.left { left: 0; border-left: 2px solid rgba(255,255,255,0.5); }
.timeline-clip .clip-handle.right { right: 0; border-right: 2px solid rgba(255,255,255,0.5); }
.timeline-clip .clip-handle:hover { background: rgba(255,255,255,0.15); }

/* Waveform-like decoration inside clips */
.timeline-clip .clip-waves { position: absolute; inset: 0; opacity: 0.15; pointer-events: none; }

/* Playhead */
#playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--warn); z-index: 30; pointer-events: none; }
#playhead::before { content: ''; position: absolute; top: 0; left: -5px; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid var(--warn); }

/* Add track button */
#add-track-btn { margin: 4px 8px; padding: 4px; background: var(--bg3); border: 1px dashed var(--border); border-radius: 3px; color: var(--text2); font-size: 11px; cursor: pointer; text-align: center; }
#add-track-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Export panel */
#export-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg2); border: 1px solid var(--accent); border-radius: 8px; padding: 20px; z-index: 1000; min-width: 400px; }
#export-panel h3 { color: var(--accent); margin-bottom: 10px; }
#export-panel textarea { width: 100%; height: 200px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Roboto Mono', monospace; font-size: 11px; padding: 8px; border-radius: 4px; }
#export-panel .btn-row { margin-top: 10px; display: flex; gap: 8px; }
#export-panel button { padding: 6px 16px; background: var(--accent2); border: none; color: #fff; border-radius: 4px; cursor: pointer; }
#export-panel button:hover { background: var(--accent); }
#export-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a4050; }

/* Drag ghost */
.drag-ghost { position: fixed; padding: 4px 10px; background: var(--accent2); color: #fff; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 9999; opacity: 0.85; }

/* === BONE PANEL (right sidebar) === */
#bone-panel { grid-column: 3; grid-row: 1; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#bone-panel-header { padding: 10px 12px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
#bone-panel-info { padding: 6px 10px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--yellow); min-height: 28px; display: flex; align-items: center; gap: 6px; }
#bone-tree { flex: 1; overflow-y: auto; padding: 4px 0; font-size: 11px; }
.bone-item { padding: 3px 8px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; transition: background 0.1s; }
.bone-item:hover { background: var(--bg4); }
.bone-item.selected { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
.bone-item .bone-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); flex-shrink: 0; }
.bone-item .bone-dot.has-kf { background: var(--yellow); }
.bone-item .bone-indent { display: inline-block; }
.bone-item .bone-toggle { width: 12px; text-align: center; color: var(--text2); font-size: 9px; cursor: pointer; }

/* Keyframe markers on timeline ruler */
.kf-diamond { position: absolute; width: 8px; height: 8px; background: var(--yellow); transform: rotate(45deg); top: 6px; margin-left: -4px; cursor: pointer; z-index: 25; border: 1px solid rgba(0,0,0,0.4); }
.kf-diamond:hover { background: #fff; }
.kf-diamond.selected { background: var(--warn); box-shadow: 0 0 4px var(--warn); }

/* Keyframe transport button */
#btn-keyframe { background: var(--yellow) !important; color: #000 !important; font-weight: bold; }
#btn-keyframe:hover { background: #ffe8a0 !important; }
</style>
</head>
<body>
<div id="app">
  <!-- CLIP LIBRARY -->
  <div id="library">
    <div id="library-header">
      <span>📚 Clip Library</span>
      <span id="clip-count" style="color:var(--text2);font-weight:normal;">0 clips</span>
    </div>
    <div id="library-clips"></div>
  </div>

  <!-- VIEWPORT -->
  <div id="viewport">
    <div id="viewport-overlay">
      <div id="frame-info">Frame 0 / 0 | 0.000s</div>
      <div id="viewport-controls">
        <label style="font-size:10px;color:var(--text2);">FPS:</label>

  <!-- TIMELINE -->
  <div id="timeline">

      <div class="tool-group">
        <button id="btn-start" title="Go to start">⏮</button>
        <button id="btn-prev" title="Previous frame">◀</button>

        <button id="btn-next" title="Next frame">▶</button>

      <div class="sep"></div>
      <label>Zoom:</label>
      <input type="range" id="zoom-slider" min="10" max="500" value="100" style="width:80px;">
      <div class="sep"></div>
      <label>Duration:</label>
      <input type="number" id="timeline-duration" value="10" min="1" max="120" step="1" style="width:50px;"> s
      <div style="flex:1;"></div>
      <button id="btn-add-track" title="Add Track" style="width:auto;padding:0 8px;">+ Track</button>
    </div>
    <div id="timeline-body">
      <div id="track-headers"></div>
      <div id="timeline-scroll">
        <div id="timeline-canvas">
          <canvas id="ruler"></canvas>
          <div id="track-lanes"></div>
          <div id="playhead" style="left:0px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Export Panel -->
<div id="export-overlay"></div>
<div id="export-panel">
  <h3>Export Animation Config</h3>
  <textarea id="export-json" readonly></textarea>
  <div class="btn-row">
    <button id="btn-copy-json">📋 Copy to Clipboard</button>
    <button id="btn-download-json">💾 Download JSON</button>
    <button id="btn-close-export">Close</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ─── CONFIG ───────────────────────────────────────────────────
const MODEL_PATH = './crimson_sentinel_rigged.glb';
const TRACK_COLORS = ['#2255aa','#aa4422','#22aa55','#aa22aa','#aa8822','#2288aa','#5533aa','#33aa88'];
const BONE_SPLIT = 'mixamorigSpine2'; // sanitized name (Three.js strips colons from track names)

// ─── STATE ────────────────────────────────────────────────────
let gltf = null, model = null, mixer = null, skeleton = null;
let allClips = {};     // name -> THREE.AnimationClip
let clipList = [];     // [{name, duration}]

// Bone name mapping: sanitized (no colons) -> bone object
let boneMap = {};      // sanitizedName -> THREE.Bone
let upperBodyBonesSanitized = new Set();
let lowerBodyBonesSanitized = new Set();

// Timeline state
let tracks = [];       // [{id, name, color, weight, mask, clips:[]}]
let trackIdCounter = 0;
let timelineClips = []; // [{id, trackId, clipName, startTime, trimStart, trimEnd, duration}]
let clipIdCounter = 0;
let selectedClipId = null;

// Playback
let playing = false;
let currentTime = 0;
let timelineDuration = 10; // seconds
let fps = 30;
let pixelsPerSecond = 100;
let activeTool = 'select'; // 'select' | 'razor'

// Drag state
let dragState = null; // {type, clipId, startX, startTime, ...}

// Three.js
let scene, camera, renderer3d, controls, clock;
// Bone name mapping: sanitized (no colons) -> bone object
let upperBodyBones = new Set();
let lowerBodyBones = new Set();

// ─── BONE EDITING STATE ──────────────────────────────────────
let skeletonHelper = null;
let boneSpheres = [];        // [{mesh, bone}] — invisible pick targets
let boneSpheresGroup = null;
let selectedBone = null;     // THREE.Bone or null
let transformCtrl = null;    // TransformControls
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// Keyframes: array of {time, boneName, quaternion: {x,y,z,w}}
let keyframes = [];
let selectedKeyframeIdx = -1;
// Custom clip built from keyframes
let customClip = null;
// Pending manual bone edits (bone rotated via gizmo, not yet keyframed)
let pendingBoneEdits = {}; // sanitizedBoneName -> THREE.Quaternion

// ─── THREE.JS SETUP ──────────────────────────────────────────
function initThree() {
  const container = document.getElementById('viewport');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0c10);

  camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 1.2, 3.5);

  renderer3d = new THREE.WebGLRenderer({ antialias: true });
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer3d.toneMapping = THREE.ACESFilmicToneMapping;
  renderer3d.toneMappingExposure = 1.0;
  container.appendChild(renderer3d.domElement);

  controls = new OrbitControls(camera, renderer3d.domElement);
  controls.target.set(0, 0.9, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.update();

  // Lights
  const dir = new THREE.DirectionalLight(0xffffff, 2.0);
  dir.position.set(3, 5, 4);
  dir.castShadow = true;
  scene.add(dir);
  scene.add(new THREE.HemisphereLight(0x8899bb, 0x223344, 0.8));
  scene.add(new THREE.AmbientLight(0x404060, 0.3));

  // Ground grid
  const grid = new THREE.GridHelper(10, 20, 0x333344, 0x222233);
  scene.add(grid);

  // Ground plane for shadow reference
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshStandardMaterial({ color: 0x15181f, roughness: 0.9 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  scene.add(ground);

  clock = new THREE.Clock();
  resizeViewport();
}

function resizeViewport() {
  const container = document.getElementById('viewport');
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer3d.setSize(w, h);
}

// ─── BONE VISUALIZATION & SELECTION ──────────────────────────
function initBoneEditing() {
  if (!skeleton || !model) return;

  // SkeletonHelper — colorful bone lines
  skeletonHelper = new THREE.SkeletonHelper(model);
  skeletonHelper.material.linewidth = 2;
  scene.add(skeletonHelper);

  // Small spheres at each bone for raycasting (invisible but pickable)
  boneSpheresGroup = new THREE.Group();
  boneSpheresGroup.name = 'boneSpheres';
  const sphereGeo = new THREE.SphereGeometry(0.025, 8, 8);
  const sphereMat = new THREE.MeshBasicMaterial({ color: 0x00b4ff, transparent: true, opacity: 0.35, depthTest: false });
  const sphereMatHover = new THREE.MeshBasicMaterial({ color: 0xffd479, transparent: true, opacity: 0.6, depthTest: false });

  for (const bone of skeleton.bones) {
    const sphere = new THREE.Mesh(sphereGeo, sphereMat.clone());
    sphere.renderOrder = 999;
    sphere.userData.bone = bone;
    sphere.userData.defaultMat = sphere.material;
    sphere.userData.hoverMat = sphereMatHover;
    boneSpheresGroup.add(sphere);
    boneSpheres.push({ mesh: sphere, bone });
  }
  scene.add(boneSpheresGroup);

  // TransformControls — rotation mode
  transformCtrl = new TransformControls(camera, renderer3d.domElement);
  transformCtrl.setMode('rotate');
  transformCtrl.setSize(0.6);
  transformCtrl.visible = false;
  transformCtrl.enabled = false;
  scene.add(transformCtrl.getHelper());

  // Disable orbit while dragging gizmo
  transformCtrl.addEventListener('dragging-changed', (e) => {
    controls.enabled = !e.value;
  });

  // Capture manual bone edits when gizmo is used
  transformCtrl.addEventListener('objectChange', () => {
    if (selectedBone) {
      pendingBoneEdits[sanitize(selectedBone.name)] = selectedBone.quaternion.clone();
    }
  });

  // Click to select bone
  renderer3d.domElement.addEventListener('click', onViewportClick);

  // Build the bone tree panel
  renderBonePanel();
  document.getElementById('bone-count').textContent = skeleton.bones.length;
}

function updateBoneSpheres() {
  // Sync sphere positions to bone world positions each frame
  for (const { mesh, bone } of boneSpheres) {
    const wp = new THREE.Vector3();
    bone.getWorldPosition(wp);
    mesh.position.copy(wp);
    // Highlight selected
    if (bone === selectedBone) {
      mesh.material = mesh.userData.hoverMat;
      mesh.scale.setScalar(2.0);
    } else {
      mesh.material = mesh.userData.defaultMat;
      mesh.scale.setScalar(1.0);
    }
  }
}

function onViewportClick(e) {
  const rect = renderer3d.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const targets = boneSpheres.map(b => b.mesh);
  const hits = raycaster.intersectObjects(targets);

  if (hits.length > 0) {
    selectBone(hits[0].object.userData.bone);
  } else {
    selectBone(null);
  }
}

function selectBone(bone) {
  selectedBone = bone;
  if (bone) {
    transformCtrl.visible = true;
    transformCtrl.enabled = true;
    transformCtrl.attach(bone);
    document.getElementById('bone-panel-info').innerHTML =
      `<span style="color:var(--accent);">●</span> ${bone.name}`;
  } else {
    transformCtrl.visible = false;
    transformCtrl.enabled = false;
    transformCtrl.detach();
    document.getElementById('bone-panel-info').textContent = 'No bone selected';
  }
  // Update bone tree selection highlight
  document.querySelectorAll('.bone-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.boneName === (bone?.name || ''));
  });
}

// ─── BONE TREE PANEL ─────────────────────────────────────────
function renderBonePanel() {
  const container = document.getElementById('bone-tree');
  container.innerHTML = '';
  if (!skeleton) return;

  function sanitize(name) { return name.replace(/[\[\].:\/]/g, ''); }

  // Find root bone(s)
  const roots = skeleton.bones.filter(b => !b.parent || !b.parent.isBone);

  function renderBoneNode(bone, depth) {
    const sName = sanitize(bone.name);
    const hasKF = keyframes.some(kf => kf.boneName === sName);
    const el = document.createElement('div');
    el.className = 'bone-item' + (bone === selectedBone ? ' selected' : '');
    el.dataset.boneName = bone.name;
    el.style.paddingLeft = (8 + depth * 12) + 'px';
    el.innerHTML = `<span class="bone-dot${hasKF ? ' has-kf' : ''}"></span>${bone.name}`;
    el.addEventListener('click', () => selectBone(bone));
    container.appendChild(el);

    // Recurse children
    for (const child of bone.children) {
      if (child.isBone) renderBoneNode(child, depth + 1);
    }
  }

  for (const root of roots) {
    renderBoneNode(root, 0);
  }
}

// ─── KEYFRAME SYSTEM ─────────────────────────────────────────
function sanitize(name) { return name.replace(/[\[\].:\/]/g, ''); }

function addKeyframe() {
  if (!selectedBone) return;
  const sName = sanitize(selectedBone.name);
  const t = Math.round(currentTime * fps) / fps; // snap to frame

  // Remove existing keyframe for this bone at this time
  keyframes = keyframes.filter(kf => !(kf.boneName === sName && Math.abs(kf.time - t) < 0.001));

  keyframes.push({
    time: t,
    boneName: sName,
    quaternion: {
      x: selectedBone.quaternion.x,
      y: selectedBone.quaternion.y,
      z: selectedBone.quaternion.z,
      w: selectedBone.quaternion.w
    }
  });

  // Clear pending edit for this bone since it's now keyframed
  delete pendingBoneEdits[sName];

  keyframes.sort((a, b) => a.time - b.time || a.boneName.localeCompare(b.boneName));
  rebuildCustomClip();
  renderBonePanel();
  renderTimeline();
  console.log(`[NLE] Keyframe set: ${sName} @ ${t.toFixed(3)}s`);
}

function deleteKeyframeAtPlayhead() {
  if (!selectedBone) return;
  const sName = sanitize(selectedBone.name);
  const t = Math.round(currentTime * fps) / fps;
  const before = keyframes.length;
  keyframes = keyframes.filter(kf => !(kf.boneName === sName && Math.abs(kf.time - t) < 0.001));
  if (keyframes.length < before) {
    rebuildCustomClip();
    renderBonePanel();
    renderTimeline();
    console.log(`[NLE] Keyframe deleted: ${sName} @ ${t.toFixed(3)}s`);
  }
}

function deleteKeyframeByIndex(idx) {
  if (idx >= 0 && idx < keyframes.length) {
    keyframes.splice(idx, 1);
    rebuildCustomClip();
    renderBonePanel();
    renderTimeline();
  }
}

function rebuildCustomClip() {
  // Group keyframes by bone
  const byBone = {};
  for (const kf of keyframes) {
    if (!byBone[kf.boneName]) byBone[kf.boneName] = [];
    byBone[kf.boneName].push(kf);
  }

  const tracks = [];
  for (const boneName in byBone) {
    const boneKFs = byBone[boneName];
    if (boneKFs.length === 0) continue;
    boneKFs.sort((a, b) => a.time - b.time);

    const times = [];
    const values = [];
    for (const kf of boneKFs) {
      times.push(kf.time);
      values.push(kf.quaternion.x, kf.quaternion.y, kf.quaternion.z, kf.quaternion.w);
    }
    tracks.push(new THREE.QuaternionKeyframeTrack(
      boneName + '.quaternion',
      times,
      values
    ));
  }

  if (tracks.length === 0) {
    customClip = null;
    // Remove from clip library
    delete allClips['Custom Animation'];
    clipList = clipList.filter(c => c.name !== 'Custom Animation');
    buildLibrary();
    return;
  }

  const maxTime = Math.max(...keyframes.map(kf => kf.time), 0.1);
  customClip = new THREE.AnimationClip('Custom Animation', maxTime, tracks);

  // Add to clip library
  allClips['Custom Animation'] = customClip;
  if (!clipList.find(c => c.name === 'Custom Animation')) {
    clipList.push({ name: 'Custom Animation', duration: maxTime });
    clipList.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    const entry = clipList.find(c => c.name === 'Custom Animation');
    entry.duration = maxTime;
  }
  buildLibrary();
}

// ─── LOAD MODEL ──────────────────────────────────────────────
async function loadModel() {
  return new Promise((resolve, reject) => {
    new GLTFLoader().load(MODEL_PATH, (g) => {
      gltf = g;
      model = g.scene;
      scene.add(model);

      // Gather clips
      for (const clip of g.animations) {
        allClips[clip.name] = clip;
        clipList.push({ name: clip.name, duration: clip.duration });
      }
      clipList.sort((a, b) => a.name.localeCompare(b.name));

      // Material tuning
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.envMapIntensity = 0.25;
            child.material.roughness = Math.max(child.material.roughness, 0.55);
            child.material.metalness = Math.min(child.material.metalness, 0.15);
            child.material.needsUpdate = true;
          }
        }
        if (child.isSkinnedMesh && child.skeleton) {
          skeleton = child.skeleton;
        }
      });

      // Build bone sets for masking
      if (skeleton) buildBoneSets();

      // Create mixer
      mixer = new THREE.AnimationMixer(model);

      // R32.127: Compute foot offset — origin is at hips, not feet.
      // Play one frame of idle to pose the skeleton, find lowest bone Y.
      {
        const idleClip = allClips['idle'] || g.animations[0];
        if (idleClip) {
          const tmpAction = mixer.clipAction(idleClip);
          tmpAction.play();
          mixer.update(1 / 60);
          model.updateWorldMatrix(true, true);
          let lowestY = Infinity;
          model.traverse(child => {
            if (child.isBone) {
              const wp = new THREE.Vector3();
              child.getWorldPosition(wp);
              if (wp.y < lowestY) lowestY = wp.y;
            }
          });
          const footOffset = lowestY < 0 ? -lowestY : 0;
          model.position.y = footOffset;
          tmpAction.stop();
          mixer.setTime(0);
          console.log(`[NLE] Foot offset: ${footOffset.toFixed(4)}m`);
        }
      }

      document.getElementById('loading').style.display = 'none';
      resolve();
    }, undefined, reject);
  });
}

function buildBoneSets() {
  if (!skeleton) return;

  // Build sanitized name -> bone mapping
  // Three.js sanitizeNodeName strips colons, brackets, dots, slashes
  function sanitize(name) { return name.replace(/[\[\].:\/]/g, ''); }

  for (const bone of skeleton.bones) {
    boneMap[sanitize(bone.name)] = bone;
  }

  // Find the split bone
  const splitBoneSanitized = BONE_SPLIT;
  const splitBone = boneMap[splitBoneSanitized];
  if (!splitBone) {
    console.warn('[NLE] Split bone not found:', splitBoneSanitized, 'Available:', Object.keys(boneMap).slice(0, 5));
    return;
  }

  // Walk descendants of split bone → upper body (using sanitized names)
  function collectDescendants(bone, set) {
    set.add(sanitize(bone.name));
    for (const child of bone.children) {
      if (child.isBone) collectDescendants(child, set);
    }
  }
  collectDescendants(splitBone, upperBodyBonesSanitized);

  // Everything else is lower body
  for (const bone of skeleton.bones) {
    const sName = sanitize(bone.name);
    if (!upperBodyBonesSanitized.has(sName)) {
      lowerBodyBonesSanitized.add(sName);
    }
  }
  console.log('[NLE] Bone split:', upperBodyBonesSanitized.size, 'upper,', lowerBodyBonesSanitized.size, 'lower');
}

// ─── CLIP LIBRARY UI ─────────────────────────────────────────
function buildLibrary() {
  const container = document.getElementById('library-clips');
  container.innerHTML = '';
  document.getElementById('clip-count').textContent = `${clipList.length} clips`;

  for (const clip of clipList) {
    const el = document.createElement('div');
    el.className = 'lib-clip';
    el.draggable = true;
    el.dataset.clipName = clip.name;
    el.innerHTML = `
      <span>${clip.name}</span>
      <span class="dur">${clip.duration.toFixed(2)}s</span>
    `;
    // Drag from library
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', clip.name);
      e.dataTransfer.effectAllowed = 'copy';
      // Custom ghost
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = clip.name;
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 0, 0);
      setTimeout(() => ghost.remove(), 0);
    });
    container.appendChild(el);
  }
}

// ─── TRACK MANAGEMENT ────────────────────────────────────────
function addTrack(name) {
  const id = trackIdCounter++;
  const color = TRACK_COLORS[id % TRACK_COLORS.length];
  const track = { id, name: name || `Track ${id + 1}`, color, weight: 1.0, mask: 'full', clips: [] };
  tracks.push(track);
  renderTimeline();
  return track;
}

function removeTrack(id) {
  timelineClips = timelineClips.filter(c => c.trackId !== id);
  tracks = tracks.filter(t => t.id !== id);
  renderTimeline();
}

// ─── TIMELINE CLIP MANAGEMENT ────────────────────────────────
function addTimelineClip(trackId, clipName, startTime) {
  const srcClip = allClips[clipName];
  if (!srcClip) return null;
  const id = clipIdCounter++;
  const tc = {
    id,
    trackId,
    clipName,
    startTime: startTime || 0,
    trimStart: 0,                  // seconds trimmed from beginning
    trimEnd: 0,                    // seconds trimmed from end
    fullDuration: srcClip.duration, // original clip duration
    get duration() { return this.fullDuration - this.trimStart - this.trimEnd; },
    get endTime() { return this.startTime + this.duration; }
  };
  timelineClips.push(tc);
  renderTimeline();
  return tc;
}

function removeTimelineClip(id) {
  timelineClips = timelineClips.filter(c => c.id !== id);
  if (selectedClipId === id) selectedClipId = null;
  renderTimeline();
}

function splitClipAtTime(id, time) {
  const clip = timelineClips.find(c => c.id === id);
  if (!clip) return;
  const localTime = time - clip.startTime;
  if (localTime <= 0.01 || localTime >= clip.duration - 0.01) return;

  // Create second half
  const id2 = clipIdCounter++;
  const secondStart = clip.trimStart + localTime;
  const tc2 = {
    id: id2,
    trackId: clip.trackId,
    clipName: clip.clipName,
    startTime: time,
    trimStart: secondStart,
    trimEnd: clip.trimEnd,
    fullDuration: clip.fullDuration,
    get duration() { return this.fullDuration - this.trimStart - this.trimEnd; },
    get endTime() { return this.startTime + this.duration; }
  };
  timelineClips.push(tc2);

  // Trim first half
  clip.trimEnd = clip.fullDuration - secondStart;
  renderTimeline();
}

// ─── TIMELINE RENDERING ──────────────────────────────────────
function renderTimeline() {
  renderTrackHeaders();
  renderTrackLanes();
  renderRuler();
  updatePlayhead();
}

function renderTrackHeaders() {
  const container = document.getElementById('track-headers');
  container.innerHTML = '';
  for (const track of tracks) {
    const el = document.createElement('div');
    el.className = 'track-header';
    el.innerHTML = `
      <div class="track-name">
        <span class="color-dot" style="background:${track.color};"></span>
        ${track.name}
      </div>
      <div class="track-controls">
        <label>W:</label>
        <input type="range" min="0" max="1" step="0.05" value="${track.weight}" data-track="${track.id}" class="weight-slider">
        <select class="mask-select" data-track="${track.id}">
          <option value="full" ${track.mask==='full'?'selected':''}>Full</option>
          <option value="upper" ${track.mask==='upper'?'selected':''}>Upper</option>
          <option value="lower" ${track.mask==='lower'?'selected':''}>Lower</option>
        </select>
        <button class="track-del" data-track="${track.id}" title="Delete track">✕</button>
      </div>
    `;
    container.appendChild(el);
  }
  // Event listeners
  container.querySelectorAll('.weight-slider').forEach(sl => {
    sl.addEventListener('input', (e) => {
      const t = tracks.find(t => t.id === +e.target.dataset.track);
      if (t) t.weight = +e.target.value;
    });
  });
  container.querySelectorAll('.mask-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const t = tracks.find(t => t.id === +e.target.dataset.track);
      if (t) t.mask = e.target.value;
    });
  });
  container.querySelectorAll('.track-del').forEach(btn => {
    btn.addEventListener('click', (e) => removeTrack(+e.target.dataset.track));
  });
}

function renderTrackLanes() {
  const container = document.getElementById('track-lanes');
  container.innerHTML = '';
  const totalWidth = timelineDuration * pixelsPerSecond;

  for (const track of tracks) {
    const lane = document.createElement('div');
    lane.className = 'track-lane';
    lane.style.width = totalWidth + 'px';
    lane.dataset.trackId = track.id;

    // Drop zone
    lane.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; lane.classList.add('drop-hover'); });
    lane.addEventListener('dragleave', () => lane.classList.remove('drop-hover'));
    lane.addEventListener('drop', (e) => {
      e.preventDefault();
      lane.classList.remove('drop-hover');
      const clipName = e.dataTransfer.getData('text/plain');
      if (!clipName || !allClips[clipName]) return;
      const rect = lane.getBoundingClientRect();
      const scrollLeft = document.getElementById('timeline-scroll').scrollLeft;
      const x = e.clientX - rect.left + scrollLeft;
      const startTime = Math.max(0, x / pixelsPerSecond);
      addTimelineClip(track.id, clipName, startTime);
    });

    // Render clips on this track
    const trackClips = timelineClips.filter(c => c.trackId === track.id);
    for (const tc of trackClips) {
      const clipEl = document.createElement('div');
      clipEl.className = 'timeline-clip' + (tc.id === selectedClipId ? ' selected' : '');
      const left = tc.startTime * pixelsPerSecond;
      const width = tc.duration * pixelsPerSecond;
      clipEl.style.left = left + 'px';
      clipEl.style.width = Math.max(width, 20) + 'px';
      clipEl.style.background = track.color;
      clipEl.dataset.clipId = tc.id;

      // Waveform decoration
      clipEl.innerHTML = `
        <div class="clip-handle left"></div>
        <div class="clip-label">${tc.clipName}${tc.trimStart > 0 || tc.trimEnd > 0 ? ' ✂' : ''}</div>
        <div class="clip-handle right"></div>
      `;

      // Click to select or razor
      clipEl.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('clip-handle')) {
          // Handle trim drag
          const side = e.target.classList.contains('left') ? 'trimLeft' : 'trimRight';
          startTrimDrag(e, tc, side);
          return;
        }
        if (activeTool === 'razor') {
          const rect = lane.getBoundingClientRect();
          const scrollLeft = document.getElementById('timeline-scroll').scrollLeft;
          const x = e.clientX - rect.left + scrollLeft;
          const time = x / pixelsPerSecond;
          splitClipAtTime(tc.id, time);
          return;
        }
        // Select + start move drag
        selectedClipId = tc.id;
        renderTimeline();
        startMoveDrag(e, tc);
      });

      lane.appendChild(clipEl);
    }

    container.appendChild(lane);
  }

  // Set canvas width
  document.getElementById('timeline-canvas').style.width = totalWidth + 'px';
}

function renderRuler() {
  const canvas = document.getElementById('ruler');
  const totalWidth = timelineDuration * pixelsPerSecond;
  canvas.width = totalWidth;
  canvas.height = 22;
  canvas.style.width = totalWidth + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Determine tick intervals based on zoom
  let majorInterval, minorInterval;
  if (pixelsPerSecond >= 200) { majorInterval = 0.5; minorInterval = 1/fps; }
  else if (pixelsPerSecond >= 80) { majorInterval = 1; minorInterval = 0.5; }
  else if (pixelsPerSecond >= 30) { majorInterval = 2; minorInterval = 1; }
  else { majorInterval = 5; minorInterval = 1; }

  // Minor ticks
  ctx.strokeStyle = '#2a3040';
  ctx.lineWidth = 1;
  for (let t = 0; t <= timelineDuration; t += minorInterval) {
    const x = Math.round(t * pixelsPerSecond) + 0.5;
    ctx.beginPath(); ctx.moveTo(x, 16); ctx.lineTo(x, 22); ctx.stroke();
  }

  // Major ticks + labels
  ctx.strokeStyle = '#556';
  ctx.fillStyle = '#8890a0';
  ctx.font = '9px monospace';
  for (let t = 0; t <= timelineDuration; t += majorInterval) {
    const x = Math.round(t * pixelsPerSecond) + 0.5;
    ctx.beginPath(); ctx.moveTo(x, 8); ctx.lineTo(x, 22); ctx.stroke();
    ctx.fillText(formatTime(t), x + 3, 7);
  }

  // Keyframe diamonds (drawn on canvas)
  if (keyframes.length > 0) {
    const sBone = selectedBone ? sanitize(selectedBone.name) : null;
    for (let i = 0; i < keyframes.length; i++) {
      const kf = keyframes[i];
      const kx = kf.time * pixelsPerSecond;
      ctx.save();
      ctx.translate(kx, 11);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = (sBone && kf.boneName === sBone) ? '#FFD479' : '#aa8822';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    }
  }
}

function updatePlayhead() {
  const ph = document.getElementById('playhead');
  ph.style.left = (currentTime * pixelsPerSecond) + 'px';

  const frame = Math.floor(currentTime * fps);
  const totalFrames = Math.floor(timelineDuration * fps);
  document.getElementById('frame-info').textContent =
    `Frame ${frame} / ${totalFrames} | ${currentTime.toFixed(3)}s`;
  document.getElementById('time-display').textContent =
    `${formatTime(currentTime)} | F:${frame}`;
}

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = t % 60;
  return `${m.toString().padStart(2,'0')}:${s.toFixed(s < 10 ? 2 : 1).padStart(5,'0')}`;
}

// ─── DRAG OPERATIONS ─────────────────────────────────────────
function startMoveDrag(e, clip) {
  const startX = e.clientX;
  const origStartTime = clip.startTime;
  const origTrackId = clip.trackId;

  function onMove(e2) {
    const dx = e2.clientX - startX;
    clip.startTime = Math.max(0, origStartTime + dx / pixelsPerSecond);
    // Snap to frame
    clip.startTime = Math.round(clip.startTime * fps) / fps;

    // Check if mouse is over a different track lane
    const lanes = document.querySelectorAll('.track-lane');
    for (const lane of lanes) {
      const rect = lane.getBoundingClientRect();
      if (e2.clientY >= rect.top && e2.clientY <= rect.bottom) {
        clip.trackId = +lane.dataset.trackId;
        break;
      }
    }
    renderTimeline();
  }
  function onUp() {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function startTrimDrag(e, clip, side) {
  e.stopPropagation();
  const startX = e.clientX;
  const origTrimStart = clip.trimStart;
  const origTrimEnd = clip.trimEnd;
  const origStartTime = clip.startTime;

  function onMove(e2) {
    const dx = e2.clientX - startX;
    const dt = dx / pixelsPerSecond;
    if (side === 'trimLeft') {
      const newTrim = Math.max(0, Math.min(clip.fullDuration - clip.trimEnd - 0.03, origTrimStart + dt));
      const trimDelta = newTrim - origTrimStart;
      clip.trimStart = newTrim;
      clip.startTime = origStartTime + trimDelta;
    } else {
      clip.trimEnd = Math.max(0, Math.min(clip.fullDuration - clip.trimStart - 0.03, origTrimEnd - dt));
    }
    // Snap
    clip.trimStart = Math.round(clip.trimStart * fps) / fps;
    clip.trimEnd = Math.round(clip.trimEnd * fps) / fps;
    clip.startTime = Math.round(clip.startTime * fps) / fps;
    renderTimeline();
  }
  function onUp() {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

// ─── PLAYBACK / ANIMATION EVALUATION ─────────────────────────
// Instead of using AnimationMixer's built-in system (which doesn't support
// multi-track weighted blending with masks easily), we manually sample
// clip tracks and apply them to bones.
//
// Each frame:
// 1. Reset all bones to bind pose
// 2. For each track (bottom to top), for each clip active at currentTime:
//    - Sample the clip at the local time
//    - Apply to bones with track weight and mask

let bindPose = {}; // sanitizedBoneName -> {pos, quat, scale}

function captureBindPose() {
  if (!skeleton) return;
  function sanitize(name) { return name.replace(/[\[\].:\/]/g, ''); }
  for (const bone of skeleton.bones) {
    bindPose[sanitize(bone.name)] = {
      pos: bone.position.clone(),
      quat: bone.quaternion.clone(),
      scale: bone.scale.clone()
    };
  }
}

function resetToBindPose() {
  if (!skeleton) return;
  for (const sName in bindPose) {
    const bone = boneMap[sName];
    const bp = bindPose[sName];
    if (bone && bp) {
      bone.position.copy(bp.pos);
      bone.quaternion.copy(bp.quat);
      bone.scale.copy(bp.scale);
    }
  }
}

// Sample a clip at a given time and return bone transforms
// Cache interpolants to avoid recreating them every frame
const _interpCache = new Map(); // "clipName:trackIdx" -> interpolant

function sampleClip(clipName, localTime) {
  const clip = allClips[clipName];
  if (!clip) return null;
  const result = {};
  for (let i = 0; i < clip.tracks.length; i++) {
    const track = clip.tracks[i];
    // Parse track name: "sanitizedBoneName.property"
    const dotIdx = track.name.lastIndexOf('.');
    if (dotIdx < 0) continue;
    const boneName = track.name.substring(0, dotIdx);
    const prop = track.name.substring(dotIdx + 1);
    // Clamp time to clip range
    const t = Math.max(0, Math.min(localTime, clip.duration));
    // Get or create interpolant
    const cacheKey = clipName + ':' + i;
    let interp = _interpCache.get(cacheKey);
    if (!interp) {
      interp = track.createInterpolant();
      _interpCache.set(cacheKey, interp);
    }
    interp.evaluate(t);
    const sampled = Array.from(interp.resultBuffer);
    if (!result[boneName]) result[boneName] = {};
    result[boneName][prop] = sampled;
  }
  return result;
}

function evaluateTimeline() {
  if (!skeleton || tracks.length === 0) return;
  resetToBindPose();

  // Accumulation buffers
  const boneWeights = {}; // sanitizedBoneName -> total weight applied

  for (const track of tracks) {
    if (track.weight <= 0) continue;
    const trackClips = timelineClips.filter(c => c.trackId === track.id);

    for (const tc of trackClips) {
      // Check if clip is active at currentTime
      if (currentTime < tc.startTime || currentTime >= tc.endTime) continue;

      const localTime = (currentTime - tc.startTime) + tc.trimStart;
      const sampled = sampleClip(tc.clipName, localTime);
      if (!sampled) continue;

      // Apply to bones (boneName here is already sanitized from track parsing)
      for (const boneName in sampled) {
        // Mask check using sanitized names
        if (track.mask === 'upper' && !upperBodyBonesSanitized.has(boneName)) continue;
        if (track.mask === 'lower' && !lowerBodyBonesSanitized.has(boneName)) continue;

        const bone = boneMap[boneName];
        if (!bone) continue;

        const data = sampled[boneName];
        const w = track.weight;
        if (!boneWeights[boneName]) boneWeights[boneName] = 0;
        const existingW = boneWeights[boneName];
        const blendW = (existingW + w) > 0 ? w / (existingW + w) : 1;

        if (data.quaternion) {
          const q = new THREE.Quaternion(data.quaternion[0], data.quaternion[1], data.quaternion[2], data.quaternion[3]);
          bone.quaternion.slerp(q, blendW);
        }
        if (data.position) {
          const p = new THREE.Vector3(data.position[0], data.position[1], data.position[2]);
          bone.position.lerp(p, blendW);
        }
        if (data.scale) {
          const s = new THREE.Vector3(data.scale[0], data.scale[1], data.scale[2]);
          bone.scale.lerp(s, blendW);
        }
        boneWeights[boneName] = existingW + w;
      }
    }
  }
}

// ─── RENDER LOOP ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  controls.update();

  if (playing) {
    currentTime += delta;
    if (currentTime >= timelineDuration) {
      currentTime = 0; // loop
    }
    updatePlayhead();
    // Auto-scroll playhead into view
    const scroll = document.getElementById('timeline-scroll');
    const phX = currentTime * pixelsPerSecond;
    if (phX > scroll.scrollLeft + scroll.clientWidth - 40 || phX < scroll.scrollLeft) {
      scroll.scrollLeft = phX - 60;
    }
  }

  // Evaluate timeline and apply to skeleton
  evaluateTimeline();

  // Re-apply pending manual bone edits (gizmo rotations not yet keyframed)
  if (!playing) {
    for (const sName in pendingBoneEdits) {
      const bone = boneMap[sName];
      if (bone) bone.quaternion.copy(pendingBoneEdits[sName]);
    }
  }

  // Update bone visualization each frame
  if (boneSpheresGroup) updateBoneSpheres();
  if (skeletonHelper) skeletonHelper.update();

  renderer3d.render(scene, camera);
}

// ─── RULER CLICK → SCRUB ────────────────────────────────────
function initRulerScrub() {
  const ruler = document.getElementById('ruler');
  const scroll = document.getElementById('timeline-scroll');

  function scrub(e) {
    const rect = ruler.getBoundingClientRect();
    const x = e.clientX - rect.left + scroll.scrollLeft;
    currentTime = Math.max(0, Math.min(timelineDuration, x / pixelsPerSecond));
    currentTime = Math.round(currentTime * fps) / fps;
    updatePlayhead();
  }

  ruler.addEventListener('mousedown', (e) => {
    scrub(e);
    function onMove(e2) { scrub(e2); }
    function onUp() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // Also allow clicking on the track area to scrub
  document.getElementById('track-lanes').addEventListener('mousedown', (e) => {
    // Only if clicking empty space (not a clip)
    if (e.target.classList.contains('track-lane')) {
      const rect = e.target.getBoundingClientRect();
      const x = e.clientX - rect.left + scroll.scrollLeft;
      currentTime = Math.max(0, Math.min(timelineDuration, x / pixelsPerSecond));
      currentTime = Math.round(currentTime * fps) / fps;
      selectedClipId = null;
      updatePlayhead();
      renderTimeline();
    }
  });
}

// ─── TRANSPORT CONTROLS ──────────────────────────────────────
function initTransport() {
  document.getElementById('btn-play').addEventListener('click', () => {
    playing = !playing;
    if (playing) pendingBoneEdits = {}; // clear manual edits on play
    document.getElementById('btn-play').textContent = playing ? '⏸' : '▶';
    document.getElementById('btn-play').classList.toggle('active', playing);
  });
  document.getElementById('btn-start').addEventListener('click', () => {
    currentTime = 0; updatePlayhead();
  });
  document.getElementById('btn-end').addEventListener('click', () => {
    currentTime = timelineDuration; updatePlayhead();
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    currentTime = Math.max(0, currentTime - 1/fps);
    currentTime = Math.round(currentTime * fps) / fps;
    updatePlayhead();
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    currentTime = Math.min(timelineDuration, currentTime + 1/fps);
    currentTime = Math.round(currentTime * fps) / fps;
    updatePlayhead();
  });

  // Razor tool
  document.getElementById('btn-razor').addEventListener('click', () => {
    activeTool = activeTool === 'razor' ? 'select' : 'razor';
    document.getElementById('btn-razor').classList.toggle('active', activeTool === 'razor');
    document.body.style.cursor = activeTool === 'razor' ? 'crosshair' : '';
  });

  // Delete
  document.getElementById('btn-delete').addEventListener('click', () => {
    if (selectedClipId !== null) removeTimelineClip(selectedClipId);
  });

  // Zoom
  document.getElementById('zoom-slider').addEventListener('input', (e) => {
    pixelsPerSecond = +e.target.value;
    renderTimeline();
  });

  // Duration
  document.getElementById('timeline-duration').addEventListener('change', (e) => {
    timelineDuration = Math.max(1, +e.target.value);
    renderTimeline();
  });

  // FPS
  document.getElementById('fps-select').addEventListener('change', (e) => {
    fps = +e.target.value;
  });

  // Add track
  document.getElementById('btn-add-track').addEventListener('click', () => addTrack());

  // Keyframe buttons
  document.getElementById('btn-keyframe').addEventListener('click', () => addKeyframe());
  document.getElementById('btn-del-keyframe').addEventListener('click', () => deleteKeyframeAtPlayhead());

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case ' ': e.preventDefault(); document.getElementById('btn-play').click(); break;
      case 'ArrowLeft': document.getElementById('btn-prev').click(); break;
      case 'ArrowRight': document.getElementById('btn-next').click(); break;
      case 'Home': document.getElementById('btn-start').click(); break;
      case 'End': document.getElementById('btn-end').click(); break;
      case 'Delete': case 'Backspace':
        if (selectedBone) { e.preventDefault(); deleteKeyframeAtPlayhead(); }
        else if (selectedClipId !== null) { e.preventDefault(); removeTimelineClip(selectedClipId); }
        break;
      case 'c': case 'C':
        if (activeTool === 'razor') { activeTool = 'select'; }
        else { activeTool = 'razor'; }
        document.getElementById('btn-razor').classList.toggle('active', activeTool === 'razor');
        document.body.style.cursor = activeTool === 'razor' ? 'crosshair' : '';
        break;
      case 'k': case 'K':
        e.preventDefault(); addKeyframe(); break;
      case 'r': case 'R':
        if (transformCtrl) transformCtrl.setMode('rotate'); break;
      case 'g': case 'G':
        if (transformCtrl) transformCtrl.setMode('translate'); break;
      case 'Escape':
        selectBone(null); break;
    }
  });
}

// ─── EXPORT ──────────────────────────────────────────────────
function buildExportConfig() {
  const config = {
    fps,
    duration: timelineDuration,
    tracks: tracks.map(t => ({
      name: t.name,
      weight: t.weight,
      mask: t.mask,
      clips: timelineClips.filter(c => c.trackId === t.id).map(c => ({
        clipName: c.clipName,
        startTime: +c.startTime.toFixed(4),
        trimStart: +c.trimStart.toFixed(4),
        trimEnd: +c.trimEnd.toFixed(4),
        duration: +c.duration.toFixed(4)
      }))
    })),
    // Bone keyframes for custom animation
    keyframes: keyframes.map(kf => ({
      time: +kf.time.toFixed(4),
      boneName: kf.boneName,
      quaternion: {
        x: +kf.quaternion.x.toFixed(6),
        y: +kf.quaternion.y.toFixed(6),
        z: +kf.quaternion.z.toFixed(6),
        w: +kf.quaternion.w.toFixed(6)
      }
    }))
  };
  return JSON.stringify(config, null, 2);
}

function initExport() {
  const panel = document.getElementById('export-panel');
  const overlay = document.getElementById('export-overlay');

  document.getElementById('btn-export').addEventListener('click', () => {
    document.getElementById('export-json').value = buildExportConfig();
    panel.style.display = 'block';
    overlay.style.display = 'block';
  });
  document.getElementById('btn-close-export').addEventListener('click', () => {
    panel.style.display = 'none';
    overlay.style.display = 'none';
  });
  overlay.addEventListener('click', () => {
    panel.style.display = 'none';
    overlay.style.display = 'none';
  });
  document.getElementById('btn-copy-json').addEventListener('click', () => {
    const ta = document.getElementById('export-json');
    navigator.clipboard.writeText(ta.value);
    document.getElementById('btn-copy-json').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('btn-copy-json').textContent = '📋 Copy to Clipboard', 1500);
  });
  document.getElementById('btn-download-json').addEventListener('click', () => {
    const blob = new Blob([document.getElementById('export-json').value], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'animation_timeline.json';
    a.click();
  });
}

// ─── RESIZE HANDLER ──────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeViewport();
  renderTimeline();
});

// ─── INIT ────────────────────────────────────────────────────
async function main() {
  initThree();
  try {
    await loadModel();
    captureBindPose();
    buildLibrary();
    initBoneEditing();

    // Create default tracks
    addTrack('Base');
    addTrack('Upper Body');
    // Set second track to upper-body mask
    if (tracks[1]) {
      tracks[1].mask = 'upper';
    }

    initTransport();
    initRulerScrub();
    initExport();
    renderTimeline();
    animate();

    console.log('[NLE] Animation editor loaded:', clipList.length, 'clips,', skeleton?.bones.length, 'bones');
  } catch (err) {
    console.error('[NLE] Failed to load:', err);
    document.getElementById('loading').innerHTML =
      `<div style="color:#f66;font-size:14px;">Failed to load model<br><small>${err.message}</small></div>`;
  }
}

main();
</script>
