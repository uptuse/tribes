<!DOCTYPE html>
<html>
<head>
<title>🐺 Wolf Sentinel — LOD Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  canvas { display: block; }
  
  #header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    background: linear-gradient(180deg, rgba(13,13,26,0.95) 0%, rgba(13,13,26,0) 100%);
    padding: 16px 24px 32px;
  }
  #header h1 { font-size: 20px; color: #0ff; margin-bottom: 8px; }
  
  #lod-buttons {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  #lod-buttons button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(0,255,255,0.3);
    color: #ccc; padding: 10px 18px; cursor: pointer; border-radius: 6px;
    font-family: inherit; font-size: 13px; transition: all 0.2s;
  }
  #lod-buttons button:hover { background: rgba(0,255,255,0.15); color: #fff; }
  #lod-buttons button.active {
    background: rgba(0,255,255,0.2); border-color: #0ff; color: #0ff;
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
  }
  
  #stats {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    background: linear-gradient(0deg, rgba(13,13,26,0.95) 0%, rgba(13,13,26,0) 100%);
    padding: 32px 24px 16px;
  }
  #stats-grid {
    display: flex; gap: 24px; justify-content: center;
  }
  .stat-box {
    text-align: center; min-width: 100px;
  }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #0ff; margin-top: 4px; }
  .stat-value.size { color: #ff8800; }
  
  #wireframe-toggle {
    position: absolute; top: 16px; right: 24px; z-index: 10;
  }
  #wireframe-toggle label {
    cursor: pointer; font-size: 13px; color: #888;
    display: flex; align-items: center; gap: 6px;
  }
  #wireframe-toggle input { accent-color: #0ff; }
  
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 16px; color: #0ff; z-index: 20;
  }
</style>
</head>
<body>

<div id="header">
  <h1>🐺🔥 Wolf Sentinel — LOD Comparison</h1>
  <div id="lod-buttons">
    <button onclick="switchLOD(0)" id="btn-0" class="active">LOD0 — Close Range</button>
    <button onclick="switchLOD(1)" id="btn-1">LOD1 — Mid Range</button>
    <button onclick="switchLOD(2)" id="btn-2">LOD2 — Far Range</button>
    <button onclick="switchLOD(-1)" id="btn-all">All Side-by-Side</button>
  </div>
</div>

<div id="wireframe-toggle">
  <label><input type="checkbox" id="wireframe-cb" onchange="toggleWireframe()"> Wireframe overlay</label>
</div>

<div id="stats">
  <div id="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Triangles</div>
      <div class="stat-value" id="stat-tris">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Vertices</div>
      <div class="stat-value" id="stat-verts">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Texture</div>
      <div class="stat-value" id="stat-tex">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">File Size</div>
      <div class="stat-value size" id="stat-size">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Reduction</div>
      <div class="stat-value" id="stat-reduction">—</div>
    </div>
  </div>
</div>

<div id="loading">Loading models...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffffff, 1.8);
key.position.set(3, 5, 4);
scene.add(key);

const fill = new THREE.DirectionalLight(0x6688cc, 0.6);
fill.position.set(-3, 3, -2);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xff8844, 0.4);
rim.position.set(0, 2, -4);
scene.add(rim);

// Ground plane
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Grid
const grid = new THREE.GridHelper(10, 20, 0x222244, 0x1a1a33);
grid.position.y = 0.001;
scene.add(grid);

const LOD_DATA = [
  { file: 'wolf_sentinel_lod0.glb', label: 'LOD0', tris: 9984, verts: 4983, tex: '2048', sizeMB: 1.2 },
  { file: 'wolf_sentinel_lod1.glb', label: 'LOD1', tris: 3000, verts: 1491, tex: '1024', sizeMB: 0.4 },
  { file: 'wolf_sentinel_lod2.glb', label: 'LOD2', tris: 500,  verts: 241,  tex: '512',  sizeMB: 0.1 },
];

const models = [];
const wireframes = [];
let currentLOD = 0;
let loaded = 0;
let autoRotate = true;

const loader = new GLTFLoader();

function loadModel(index) {
  return new Promise((resolve) => {
    loader.load(LOD_DATA[index].file, (gltf) => {
      const model = gltf.scene;
      
      // Normalize: center and scale to ~1.8m
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const scale = 1.8 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);
      
      const box2 = new THREE.Box3().setFromObject(model);
      const center2 = box2.getCenter(new THREE.Vector3());
      model.position.sub(center2);
      model.position.y = -box2.min.y;
      
      // Create wireframe overlay
      const wireGroup = new THREE.Group();
      model.traverse(child => {
        if (child.isMesh) {
          const wire = new THREE.WireframeGeometry(child.geometry);
          const line = new THREE.LineSegments(wire, new THREE.LineBasicMaterial({
            color: 0x00ffff, opacity: 0.15, transparent: true
          }));
          line.position.copy(child.position);
          line.rotation.copy(child.rotation);
          line.scale.copy(child.scale);
          wireGroup.add(line);
        }
      });
      wireGroup.scale.copy(model.scale);
      wireGroup.position.copy(model.position);
      wireGroup.visible = false;
      
      // Wrap in group for positioning
      const wrapper = new THREE.Group();
      wrapper.add(model);
      wrapper.add(wireGroup);
      wrapper.visible = false;
      scene.add(wrapper);
      
      models[index] = wrapper;
      wireframes[index] = wireGroup;
      
      // Count actual vertices from geometry
      let actualVerts = 0, actualTris = 0;
      model.traverse(child => {
        if (child.isMesh && child.geometry) {
          actualVerts += child.geometry.attributes.position.count;
          if (child.geometry.index) {
            actualTris += child.geometry.index.count / 3;
          } else {
            actualTris += child.geometry.attributes.position.count / 3;
          }
        }
      });
      LOD_DATA[index].actualVerts = actualVerts;
      LOD_DATA[index].actualTris = Math.round(actualTris);
      
      loaded++;
      document.getElementById('loading').textContent = `Loading... ${loaded}/3`;
      
      resolve();
    });
  });
}

// Load all models
Promise.all([loadModel(0), loadModel(1), loadModel(2)]).then(() => {
  document.getElementById('loading').style.display = 'none';
  switchLOD(0);
});

function updateStats(index) {
  const d = LOD_DATA[index];
  document.getElementById('stat-tris').textContent = d.actualTris.toLocaleString();
  document.getElementById('stat-verts').textContent = d.actualVerts.toLocaleString();
  document.getElementById('stat-tex').textContent = d.tex + 'px';
  document.getElementById('stat-size').textContent = d.sizeMB + ' MB';
  const reduction = Math.round((1 - d.actualTris / LOD_DATA[0].actualTris) * 100);
  document.getElementById('stat-reduction').textContent = index === 0 ? 'Base' : `-${reduction}%`;
}

window.switchLOD = function(index) {
  currentLOD = index;
  
  // Update buttons
  document.querySelectorAll('#lod-buttons button').forEach((b, i) => {
    b.classList.toggle('active', 
      (index === -1 && b.id === 'btn-all') || 
      (index >= 0 && b.id === `btn-${index}`)
    );
  });
  
  if (index === -1) {
    // Side-by-side
    const spacing = 2.0;
    models.forEach((m, i) => {
      m.visible = true;
      m.position.x = (i - 1) * spacing;
    });
    // Show stats for all
    document.getElementById('stat-tris').textContent = LOD_DATA.map(d => d.actualTris.toLocaleString()).join(' / ');
    document.getElementById('stat-verts').textContent = LOD_DATA.map(d => d.actualVerts.toLocaleString()).join(' / ');
    document.getElementById('stat-tex').textContent = LOD_DATA.map(d => d.tex).join(' / ');
    document.getElementById('stat-size').textContent = LOD_DATA.map(d => d.sizeMB).join(' / ') + ' MB';
    document.getElementById('stat-reduction').textContent = 'All';
    controls.target.set(0, 0.8, 0);
  } else {
    models.forEach((m, i) => {
      m.visible = (i === index);
      m.position.x = 0;
    });
    updateStats(index);
    controls.target.set(0, 0.8, 0);
  }
};

window.toggleWireframe = function() {
  const on = document.getElementById('wireframe-cb').checked;
  wireframes.forEach(w => { if (w) w.visible = on; });
};

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  
  // Slow auto-rotate
  if (autoRotate) {
    models.forEach(m => {
      if (m && m.visible) {
        m.children[0].rotation.y += dt * 0.3;
        if (m.children[1]) m.children[1].rotation.y = m.children[0].rotation.y;
      }
    });
  }
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Stop auto-rotate when user interacts
controls.addEventListener('start', () => { autoRotate = false; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
